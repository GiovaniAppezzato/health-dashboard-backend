services:
  app:
    build:
      args:
        user: tecsa
        uid: 1000
        gid: 1000
      dockerfile: .docker/Dockerfile
    container_name: tecsa_backend
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage/logs/laravel:/var/log/laravel
    depends_on:
      - db
    networks:
      - app-network

  webserver:
    image: nginx:stable-alpine
    container_name: tecsa_webserver
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www/html
      - ./.docker/nginx/conf.d:/etc/nginx/conf.d
      - ./storage/logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - app-network

  db:
    image: postgres:15
    container_name: tecsa_database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - tecsa_database_data:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
    tecsa_database_data:

networks:
  app-network:
    driver: bridge
    external: true
